version: "3.4"

name: iot-system

services:
  mysql:
    container_name: iot-mysql
    image: mysql:8
    restart: unless-stopped
    tty: true
    ports:
      - "3306:3306"
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE:-enjoyiot}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-123456}
    volumes:
      - mysql:/var/lib/mysql/
      - ../../_sql/mysql/system.sql:/docker-entrypoint-initdb.d/system.sql:ro #会自动使用system.sql文件来初始化数据库,请确保sql文件存在

  redis:
    container_name: iot-redis
    image: redis:6-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis:/data
  tdengine:
    image: tdengine/tdengine:3.3.3.0
    container_name: eiot-server-td
    ports:
      - "6030:6030"          # TDengine server port
      - "6041:6041"          # TDengine client port
      - "6043:6043"          # TDengine monitoring port
      - "6044-6049:6044-6049" # Additional ports range
      - "6044-6045:6044-6045/udp" # UDP ports
      - "6060:6060"          # Another port for service
    environment:
      TAOS_USER: ${TAOS_USER:-root}      # 设置默认用户名
      TAOS_PASSWORD: ${TAOS_PASSWORD:-taosdata} # 设置默认密码
    volumes:
      - tdengine_lib:/var/lib/taos   # 持久化存储
      - tdengine_log:/var/log/taos  # 持久化存储

